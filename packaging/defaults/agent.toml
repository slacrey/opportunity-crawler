[shared]
environment = "development"
data_dir = "./var/data"
log_dir = "./var/logs"
tmp_dir = "./var/tmp"
database_path = "./var/data/opportunity-crawler.db"
evidence_dir = "./var/data/evidence"
screenshots_dir = "./var/data/screenshots"
browser_profiles_dir = "./var/data/browser-profiles"

[agent]
agent_id = "local-agent"
host_id = "local-host"
capacity = 1
max_concurrency = 1
control_plane_base_url = "http://127.0.0.1:8000"

